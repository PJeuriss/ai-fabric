apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: networkfabrics.fabric.ai-fabric.io
spec:
  group: fabric.ai-fabric.io
  scope: Cluster
  names:
    kind: NetworkFabric
    plural: networkfabrics
    singular: networkfabric
    shortNames: ["nf"]
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources: { status: {} }
      additionalPrinterColumns:
        - { name: Nodes, type: integer, jsonPath: .status.nodes }
        - { name: Leaves, type: integer, jsonPath: .status.leaves }
        - { name: MaxLinkUtil, type: number, jsonPath: .status.maxLinkUtil }
        - { name: ObservedAt, type: string, jsonPath: .status.observedAt }
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                topology: { type: string }
            status:
              type: object
              properties:
                nodes: { type: integer }
                leaves: { type: integer }
                maxLinkUtil: { type: number }
                observedAt: { type: string }
---
