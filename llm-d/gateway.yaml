# Envoy Gateway front door + HTTPRoute that sends inference traffic to the
# InferencePool (EPP-backed). Clients hit the Gateway; EPP picks the endpoint.
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: envoy
spec:
  controllerName: gateway.envoyproxy.io/gatewayclass-controller
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: llm-d-gw
  namespace: llm-d
spec:
  gatewayClassName: envoy
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces: { from: Same }
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: llm-d-route
  namespace: llm-d
spec:
  parentRefs:
    - name: llm-d-gw
  rules:
    - matches:
        - path: { type: PathPrefix, value: /v1 }
      backendRefs:
        - group: inference.networking.x-k8s.io
          kind: InferencePool
          name: llm-d-pool
