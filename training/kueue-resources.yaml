# Kueue quota + Topology-Aware Scheduling (TAS) over the simulated fabric.
# The Topology tells Kueue about the leaf/spine hierarchy so it can pack a gang
# job's pods network-close (same leaf, then same spine group).
apiVersion: kueue.x-k8s.io/v1alpha1
kind: Topology
metadata:
  name: fabric-topology
spec:
  levels:
    - nodeLabel: ai-fabric.io/spine-group
    - nodeLabel: ai-fabric.io/leaf
    - nodeLabel: kubernetes.io/hostname
---
apiVersion: kueue.x-k8s.io/v1beta1
kind: ResourceFlavor
metadata:
  name: gpu-flavor
spec:
  nodeLabels:
    run.ai/simulated-gpu-node-pool: default
  topologyName: fabric-topology
  # tolerate the KWOK taint so gang pods can bind to simulated nodes
  tolerations:
    - key: kwok.x-k8s.io/node
      operator: Equal
      value: fake
      effect: NoSchedule
---
apiVersion: kueue.x-k8s.io/v1beta1
kind: ClusterQueue
metadata:
  name: gpu-cluster-queue
spec:
  namespaceSelector: {}
  resourceGroups:
    - coveredResources: ["nvidia.com/gpu", "cpu", "memory"]
      flavors:
        - name: gpu-flavor
          resources:
            - { name: "nvidia.com/gpu", nominalQuota: 4096 }
            - { name: "cpu", nominalQuota: 100000 }
            - { name: "memory", nominalQuota: 100Ti }
---
apiVersion: kueue.x-k8s.io/v1beta1
kind: LocalQueue
metadata:
  name: gpu-queue
  namespace: training
spec:
  clusterQueue: gpu-cluster-queue
