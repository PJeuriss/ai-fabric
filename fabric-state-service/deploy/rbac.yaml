apiVersion: v1
kind: ServiceAccount
metadata:
  name: fabric-state-service
  namespace: ai-fabric-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: fabric-state-service
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["fabric.ai-fabric.io"]
    resources: ["networkfabrics", "networkfabrics/status", "fabriclinks", "fabriclinks/status", "nodefabriclocations"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: fabric-state-service
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: fabric-state-service
subjects:
  - kind: ServiceAccount
    name: fabric-state-service
    namespace: ai-fabric-system
