# InferencePool: the set of model-serving endpoints (our mock-vLLM pods) plus a
# reference to the EPP that picks among them. This is the Gateway API Inference
# Extension resource that ties data plane (Envoy) to the routing brain.
apiVersion: inference.networking.x-k8s.io/v1alpha2
kind: InferencePool
metadata:
  name: llm-d-pool
  namespace: llm-d
spec:
  targetPortNumber: 8000
  selector:
    app: mock-vllm
  extensionRef:
    name: llm-d-epp
    portNumber: 9002
---
# InferenceObjective steers EPP scheduling goals (priority / SLOs) for a model.
apiVersion: inference.networking.x-k8s.io/v1alpha2
kind: InferenceObjective
metadata:
  name: llama
  namespace: llm-d
spec:
  poolRef:
    name: llm-d-pool
  modelName: meta-llama/Llama-3.1-8B-Instruct
  criticality: Standard
